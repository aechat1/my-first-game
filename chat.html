<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AE CHAT - المنصة الرئيسية</title>
    <style>
        /* تصفير إجباري لكامل النظام المحيط */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; -webkit-user-select: none; }
        html, body { width: 100%; height: 100%; background: #0c0214; overflow: hidden; }
        
        /* 🚨 [الطبقة العائمة الطائرة لإجبار السكربت والمتصفح على إظهار العناصر رغماً عنه] 🚨 */
        .fixed-layer-override {
            position: fixed; /* تثبيت مطلق فوق أي سكربت أو حجب */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999999 !important; /* أعلى درجة حماية برمجية للظهور فوق كل شيء */
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0c0214;
        }

        /* حاوية الشات البنفسجية المتدرجة الفاخرة */
        .mobile-container { 
            width: 100%; 
            max-width: 430px; 
            height: 100%; 
            background: linear-gradient(180deg, #451066 0%, #25073b 50%, #0d0114 100%); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative;
        }
        
        @keyframes uaeGlitter { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* 1. الهيدر العلوي */
        .top-header-wrapper {
            width: 100%;
            padding-bottom: 2px;
            background: linear-gradient(90deg, #ff0000, #00732f, #ffffff, #000000, #ff0000);
            background-size: 300% 300%;
            animation: uaeGlitter 5s linear infinite;
            flex-shrink: 0;
        }
        .top-header-inner {
            background: #140221;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-room-section { display: flex; align-items: center; gap: 10px; }
        .header-room-badge { width: 34px; height: 34px; border-radius: 50%; background: #25073b; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; justify-content: center; align-items: center; font-size: 14px; }
        .header-room-title { font-size: 15px; color: #ffffff; font-weight: 800; }
        .top-action-btn { background: rgba(255, 59, 48, 0.2); border: 1px solid rgba(255, 59, 48, 0.4); padding: 5px 12px; border-radius: 6px; color: #ff453a; font-size: 11px; font-weight: 700; cursor: pointer; }

        /* 2. شريط الإعلان المطور والمتحرك مجبراً */
        .pulsing-ad-bar {
            width: 100%;
            background: rgba(20, 2, 33, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-shrink: 0;
        }
        .ad-click-badge { font-size: 11px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #ffffff; padding: 5px 12px; border-radius: 6px; font-weight: 600; }
        .ad-marquee-container { flex: 1; overflow: hidden; display: flex; align-items: center; }
        .ad-marquee-text { display: inline-block; white-space: nowrap; animation: marqueeLeftToRight 12s linear infinite; }
        @keyframes marqueeLeftToRight {
            0% { transform: translate3d(-100%, 0, 0); }
            100% { transform: translate3d(100%, 0, 0); }
        }
        .ad-marquee-text h4 { color: #ffffff; font-size: 13px; font-weight: 700; display: inline-block; margin-left: 8px; }

        /* 3. شاشة الرسائل والمحادثة */
        .main-content-space {
            flex: 1;
            width: 100%;
            padding: 15px; 
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }
        .chat-message {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 85%;
            color: #ffffff;
            font-size: 14px;
            align-self: flex-start;
        }

        /* 4. كتلة الفوتر السفلي الصارمة ومحجوزة الأبعاد والموقع إجبارياً */
        .bottom-fixed-footer-block {
            width: 100%;
            padding: 12px 15px 25px 15px; 
            background: #140221;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
        }
        
        /* صندوق الشات الفاخر */
        .royal-chat-box {
            width: 100%;
            background: #25073b; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 14px;
            padding: 10px;
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .royal-input-area { flex: 1; display: flex; flex-direction: column; }
        .chat-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2); 
            padding: 6px 4px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            text-align: right;
        }
        .royal-emoji-area { display: flex; flex-direction: row; align-items: center; gap: 8px; border-right: 1px solid rgba(255, 255, 255, 0.15); padding-right: 8px; direction: ltr; }
        .royal-emoji-btn { font-size: 19px; cursor: pointer; background: none; border: none; }
        .more-emoji-btn { font-size: 15px; color: #b899d9; font-weight: bold; background: none; border: none; }
        .royal-send-btn { font-size: 18px; color: #52b788; font-weight: bold; background: none; border: none; padding: 0 4px; cursor: pointer; }

        /* شريط المتواجدين حالياً والترس الإداري */
        .admin-status-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .online-count-box { display: flex; align-items: center; gap: 6px; color: #b899d9; font-size: 12px; }
        .online-dot { width: 7px; height: 7px; background: #52b788; border-radius: 50%; }
        .admin-gear-btn { background: none; border: none; font-size: 20px; color: #b899d9; cursor: pointer; }

        /* صندوق اختيار المزيد من الابتسامات المنبثق */
        .emoji-picker-popup {
            position: absolute;
            bottom: 120px; 
            left: 15px;
            right: 15px;
            background: #140221;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 12px;
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            z-index: 1000000 !important;
        }
        .emoji-picker-popup.active { display: grid; }
        .picker-emoji-item { display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- 🚨 غلاف الحماية والكسر الإجباري للحجب 🚨 -->
    <div class="fixed-layer-override">
        
        <div class="mobile-container">
            
            <!-- 1. الهيدر العلوي -->
            <div class="top-header-wrapper">
                <div class="top-header-inner">
                    <div class="header-room-section">
                        <div class="header-room-badge">👑</div>
                        <div class="header-room-info">
                            <span class="header-room-title">غرفة بن دبي</span>
                        </div>
                    </div>
                    <div class="top-action-btn" onclick="exitRoom()">خروج</div>
                </div>
            </div>

            <!-- 2. شريط الإعلان المطور -->
            <div class="pulsing-ad-bar" id="secureAd" data-target-url="https://instagram.com">
                <span class="ad-click-badge">زيارة</span>
                <div class="ad-marquee-container">
                    <div class="ad-marquee-text">
                        <h4>خصومات متجر الإمارات الفاخرة 🇦🇪 - احصل على حزم الشعارات الآن المضيئة</h4>
                    </div>
                </div>
            </div>

            <!-- 3. شاشة عرض رسائل الشات والترحيب للتأكيد -->
            <div class="main-content-space" id="chatScreen">
                <div class="chat-message">مرحباً بك في غرفة بن دبي! تواصل بخصوصية تامة 🇦🇪</div>
                <div class="chat-message">تم كسر حجب نظام السكربت وإجبار الفوتر والترس على الظهور بنجاح 🚀🔥</div>
            </div>

            <!-- 4. حاوية الفوتر السفلي الإلزامية والثابتة برمجياً كلياً -->
            <div class="bottom-fixed-footer-block">
                
                <div class="emoji-picker-popup" id="emojiPicker">
                    <div class="picker-emoji-item" onclick="insertEmoji('😂')">😂</div>
                    <div class="picker-emoji-item" onclick="insertEmoji('🤣')">🤣</div>
                    <div class="picker-emoji-item" onclick="insertEmoji('🔥')">🔥</div>
                    <div class="picker-emoji-item" onclick="insertEmoji('👑')">👑</div>
                    <div class="picker-emoji-item" onclick="insertEmoji('❤️')">❤️</div>
                </div>

                <!-- صندوق الشات الفاخر -->
                <div class="royal-chat-box">
                    <div class="royal-input-area">
                        <input type="text" class="chat-input" id="messageInput" placeholder="اكتب رسالتك هنا..." onkeypress="checkEnter(event)">
                    </div>
                    <div class="royal-emoji-area">
