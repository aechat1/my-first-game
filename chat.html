<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شات الإمارات</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; margin: 0; padding: 20px; color: white; }
        #chat-container { max-width: 500px; margin: auto; background: #1e293b; border-radius: 15px; overflow: hidden; padding: 20px; }
        #messages { height: 300px; overflow-y: scroll; border-bottom: 1px solid #334155; margin-bottom: 10px; padding: 10px; }
        input { width: 70%; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px; background: #38bdf8; border: none; border-radius: 5px; color: #0f172a; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat-container">
    <h2>غرفة دردشة الإمارات</h2>
    <div id="messages"></div>
    <div style="display:flex; gap: 5px;">
        <input type="text" id="msgInput" placeholder="اكتب رسالتك...">
        <button onclick="sendMessage()">إرسال</button>
    </div>
</div>

<script>
    function sendMessage() {
        let input = document.getElementById("msgInput");
        if (input.value.trim() !== "") {
            let div = document.createElement("div");
            div.innerHTML = "<b>أنت:</b> " + input.value;
            document.getElementById("messages").appendChild(div);
            input.value = "";
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        }
    }
</script>

</body>
</html>
