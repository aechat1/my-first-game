<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            /* تدرج هادئ جداً من البنفسجي للبنفسجي الغني (بدون أسود) */
            background: linear-gradient(135deg, #4c1d95, #2e1065);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; font-family: sans-serif;
        }

        .card { 
            background: #1e0a35; /* لون بنفسجي غامق وثابت */
            padding: 50px; 
            border-radius: 20px; 
            width: 85%; max-width: 400px;
            text-align: center; color: white;
            /* إطار ثابت ليموني نحيف جداً وأنيق */
            border: 1px solid #CCFF00;
        }

        h1 { color: #CCFF00; font-size: 28px; margin-bottom: 10px; }
        p { color: #d1d5db; margin-bottom: 40px; font-size: 16px; }
        
        .btn { 
            display: block; 
            background: transparent; /* أزرار شفافة بحدود ليمونية */
            color: #CCFF00; 
            padding: 15px; 
            margin: 15px 0; 
            text-decoration: none; 
            border-radius: 10px; 
            border: 1px solid #CCFF00;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { 
            background: #CCFF00; 
            color: #1e0a35; 
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>منصتي الإماراتية</h1>
        <p>تجربة تواصل وألعاب تليق بطموحكم.</p>
        <a href="chat.html" class="btn">دخول الشات</a>
        <a href="#" class="btn">تجربة الألعاب</a>
    </div>
</body>
</html>
