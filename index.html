<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة لعبة aechat.ae - مسار القلعة المفتوح</title>
    <style>
        body {
            background-color: #160e0a;
            color: #f4ebd0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            padding-top: 10px;
            overflow: hidden;
            user-select: none;
        }
        h1 { 
            margin: 0 0 10px 0; 
            font-size: 16px; 
            color: #d4b285;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .board-container {
            width: 94vw;
            height: 94vw;
            max-width: 480px;
            max-height: 480px;
            position: relative;
        }
        canvas {
            width: 100%;
            height: 100%;
            border: 12px solid #2b1a10;
            border-radius: 20px;
            background-color: #dfb68d;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5), 0 15px 30px rgba(0,0,0,0.6);
        }
        .cards-area {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            width: 90vw;
            max-width: 450px;
        }
        .game-card {
            width: 65px;
            height: 95px;
            background: linear-gradient(135deg, #2c251e, #1a1512);
            border: 2px solid #c5a059;
            border-radius: 8px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #e5c180;
            font-size: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .game-card:hover {
            transform: translateY(-8px);
        }
        .card-icon {
            font-size: 18px;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <h1>مشروع لعبة Sorry المطور لـ aechat.ae</h1>
    
    <div class="board-container">
        <canvas id="gameBoard" width="600" height="600"></canvas>
    </div>

    <div class="cards-area">
        <div class="game-card"><span>جاكارو</span><div class="card-icon">👑</div></div>
        <div class="game-card"><span>جاكارو</span><div class="card-icon">⚔️</div></div>
        <div class="game-card"><span>جاكارو</span><div class="card-icon">🛡️</div></div>
        <div class="game-card"><span>جاكارو</span><div class="card-icon">✨</div></div>
    </div>

    <script>
        const canvas = document.getElementById('gameBoard');
        const ctx = canvas.getContext('2d');

        const boardSize = 600;
        const center = boardSize / 2;
        
        // شبكة من 22 خانة لضمان مساحات مفتوحة تماماً بين اللاعبين بدون تداخل
        const gridCount = 22; 
        const squareSize = boardSize / gridCount;

        const playerColors = {
            player1: '#2ecc71', // أخضر
            player2: '#2980b9', // أزرق
            player3: '#e74c3c', // أحمر
            player4: '#f1c40f'  // أصفر
        };

        // بناء الالتفاف الحقيقي (19 خانة) لضلع واحد بناءً على المخطط الذي رسمته بيدك
        function generateSideCastlePath() {
            const path = [];
            
            // 1 إلى 5: مستقيم على الحافة الخارجية
            for(let k = 0; k < 5; k++) path.push({ gx: k, gy: 0 });
            
            // 6 و7 و8: دخول عمودي لداخل اللوح الخشبي
            path.push({ gx: 4, gy: 1 });
            path.push({ gx: 4, gy: 2 });
            path.push({ gx: 4, gy: 3 });
            
            // 9 و10: التفاف جانبي موازٍ للحافة
            path.push({ gx: 5, gy: 3 });
            path.push({ gx: 6, gy: 3 });
            
            // 11 و12 و13: خروج عمودي عائد للحافة الخارجية
            path.push({ gx: 6, gy: 2 });
            path.push({ gx: 6, gy: 1 });
            path.push({ gx: 6, gy: 0 });
            
            // 14 إلى 19: إكمال المسار المستقيم على الحافة حتى نهاية الضلع
            for(let k = 7; k <= 12; k++) path.push({ gx: k, gy: 0 });
            
            return path;
        }

        // تدوير مصفوفة النقاط هندسياً لتوزيع القلعة المفتوحة على الجهات الأربعة بالتناظر التام
        function rotateCoordinates(pt, sideIndex) {
            const max = gridCount - 1; // 21
            if (sideIndex === 0) return { x: pt.gx, y: pt.gy };                  // الضلع العلوي
            if (sideIndex === 1) return { x: max - pt.gy, y: pt.gx };            // الضلع الأيمن
            if (sideIndex === 2) return { x: max - pt.gx, y: max - pt.gy };      // الضلع السفلي
            if (sideIndex === 3) return { x: pt.gy, y: max - pt.gx };            // الضلع الأيسر
        }

        function drawBoard() {
            ctx.clearRect(0, 0, boardSize, boardSize);
            drawWoodTexture();

            const baseSidePath = generateSideCastlePath();
            const colors = [playerColors.player1, playerColors.player2, playerColors.player3, playerColors.player4];

            for (let side = 0; side < 4; side++) {
                // 1. رسم مسار الالتفاف الـ 19 النظيف والمنعزل
                baseSidePath.forEach((gridPt, index) => {
                    const stepNum = index + 1;
                    const finalGrid = rotateCoordinates(gridPt, side);

                    let isStart = (stepNum === 1);
                    let color = isStart ? colors[side] : '#3d2516'; // مربع البداية ملون والباقي خشبي غامق غائر
                    
                    drawWoodSquare(finalGrid.x * squareSize, finalGrid.y * squareSize, color, isStart, stepNum);
                });

                // 2. رسم مسار الأمان الخماسي ينطلق مستقيماً لداخل اللوحة من المربع رقم 18 (الفهرس رقم 16 في الالتفاف)
                const turnGridPt = baseSidePath[16]; 
                let dx = 0, dy = 1; // الاتجاه الافتراضي للداخل

                for (let h = 1; h <= 5; h++) {
                    const hx = turnGridPt.gx;
                    const hy = turnGridPt.gy + h; // ينزل لعمق اللوحة عمودياً
                    const finalHomeGrid = rotateCoordinates({ gx: hx, gy: hy }, side);
                    
                    drawWoodSquare(finalHomeGrid.x * squareSize, finalHomeGrid.y * squareSize, colors[side] + 'bb', false, h);
                }
            }

            drawCenterDiscardPile();
        }

        function drawWoodTexture() {
            let gradient = ctx.createRadialGradient(center, center, 40, center, center, 280);
            gradient.addColorStop(0, '#eac39e');
            gradient.addColorStop(0.8, '#d4a574');
            gradient.addColorStop(1, '#ac7a48');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, boardSize, boardSize);

            ctx.strokeStyle = 'rgba(74, 43, 23, 0.03)';
            ctx.lineWidth = 2;
            for(let r = 50; r < 250; r += 35) {
                ctx.beginPath();
                ctx.arc(center, center, r, 0, 2 * Math.PI);
                ctx.stroke();
            }
        }

        function drawWoodSquare(x, y, color, isStart, number) {
            ctx.save();
            ctx.fillStyle = color;
            ctx.fillRect(x + 1, y + 1, squareSize - 2, squareSize - 2);

            ctx.strokeStyle = isStart ? '#fff' : '#54341e';
            ctx.lineWidth = isStart ? 2 : 1;
            ctx.strokeRect(x + 1, y + 1, squareSize - 2, squareSize - 2);

            ctx.fillStyle = isStart ? '#fff' : 'rgba(255,255,255,0.3)';
            ctx.font = isStart ? 'bold 10px Arial' : '8px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(number.toString(), x + (squareSize / 2), y + (squareSize / 2));
            ctx.restore();
        }

        function drawCenterDiscardPile() {
            ctx.save();
            ctx.translate(center, center);
            ctx.rotate(5 * Math.PI / 180);

            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 12;
            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            ctx.shadowOffsetY = 4;
            ctx.fillRect(-32, -46, 64, 92);

            ctx.shadowColor = 'transparent';
            ctx.strokeStyle = '#c5a059';
            ctx.lineWidth = 2;
            ctx.strokeRect(-28, -42, 56, 84);

            ctx.fillStyle = '#1c1714';
            ctx.font = 'bold 24px Georgia, serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('+6', 0, 0);
            
            ctx.restore();
        }

        drawBoard();
    </script>
</body>
</html>
