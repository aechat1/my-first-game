<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة لعبة aechat.ae - المربعات الخشبية</title>
    <style>
        body {
            background-color: #1a0f0a; /* خلفية الطاولة الداكنة */
            color: #f4ebd0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            padding-top: 10px;
            overflow: hidden;
            user-select: none;
        }
        h1 { 
            margin: 0 0 10px 0; 
            font-size: 16px; 
            color: #d4b285;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .board-container {
            width: 94vw;
            height: 94vw;
            max-width: 480px;
            max-height: 480px;
            position: relative;
        }
        canvas {
            width: 100%;
            height: 100%;
            border: 12px solid #2b1a10; /* إطار خشبي فخم */
            border-radius: 20px;
            background-color: #dfb68d; /* أرضية الخشب الدافئة */
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5), 0 15px 30px rgba(0,0,0,0.6);
        }
        .cards-area {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            width: 90vw;
            max-width: 450px;
        }
        .game-card {
            width: 65px;
            height: 95px;
            background: linear-gradient(135deg, #2c251e, #1a1512); /* تصميم الكروت الداكن */
            border: 2px solid #c5a059;
            border-radius: 8px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #e5c180;
            font-size: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .game-card:hover {
            transform: translateY(-8px);
        }
        .card-icon {
            font-size: 18px;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <h1>مشروع لعبة Sorry المطور لـ aechat.ae</h1>
    
    <div class="board-container">
        <canvas id="gameBoard" width="600" height="600"></canvas>
    </div>

    <div class="cards-area">
        <div class="game-card"><span>جاكارو</span><div class="card-icon">👑</div></div>
        <div class="game-card"><span>جاكارو</span><div class="card-icon">⚔️</div></div>
        <div class="game-card"><span>جاكارو</span><div class="card-icon">🛡️</div></div>
        <div class="game-card"><span>جاكارو</span><div class="card-icon">✨</div></div>
    </div>

    <script>
        const canvas = document.getElementById('gameBoard');
        const ctx = canvas.getContext('2d');

        const boardSize = 600;
        const center = boardSize / 2;
        
        // تقسيم اللوحة لشبكة مربعات داخلية
        const gridCount = 20; 
        const squareSize = boardSize / gridCount;

        const playerColors = {
            player1: '#2ecc71', // أخضر
            player2: '#2980b9', // أزرق
            player3: '#e74c3c', // أحمر
            player4: '#f1c40f'  // أصفر
        };

        // دالة مخصصة لإنشاء مسار الضلع المستقيم (19 مربعاً)
        function generateSideGridPath() {
            const path = [];
            // الإطار الخارجي المستقيم للضلع (19 مربع بالتسلسل)
            for(let k = 0; k < 19; k++) {
                path.push({ gx: k, gy: 0 });
            }
            return path;
        }

        // تدوير المربعات لتوزيعها على الجهات الأربعة بالتساوي
        function rotateCoordinates(pt, sideIndex) {
            const max = gridCount - 1; // 19
            if (sideIndex === 0) return { x: pt.gx, y: pt.gy };                  // العلوي
            if (sideIndex === 1) return { x: max - pt.gy, y: pt.gx };            // الأيمن
            if (sideIndex === 2) return { x: max - pt.gx, y: max - pt.gy };      // السفلي
            if (sideIndex === 3) return { x: pt.gy, y: max - pt.gx };            // الأيسر
        }

        function drawBoard() {
            ctx.clearRect(0, 0, boardSize, boardSize);
            drawWoodTexture();

            const baseSide = generateSideGridPath();
            const colors = [playerColors.player1, playerColors.player2, playerColors.player3, playerColors.player4];

            for (let side = 0; side < 4; side++) {
                // 1. رسم الـ 19 مربعاً الخشبية الخارجية لكل لاعب
                baseSide.forEach((gridPt, index) => {
                    const stepNum = index + 1;
                    const finalGrid = rotateCoordinates(gridPt, side);

                    let isStart = (stepNum === 1);
                    let color = isStart ? colors[side] : '#3d2516'; // مربع البداية ملون، والباقي خشبي غامق محفور
                    
                    drawWoodSquare(finalGrid.x * squareSize, finalGrid.y * squareSize, color, isStart, stepNum);
                });

                // 2. رسم مسار الأمان الخماسي انطلاقاً من المربع رقم 18 (الفهرس 17) ليدخل عمودياً للداخل
                const turnGridPt = baseSide[17]; // المربع 18
                let dx = 0, dy = 0;

                if (side === 0) dy = 1;  // العلوي ينزل للأسفل
                if (side === 1) dx = -1; // الأيمن يتجه لليسار
                if (side === 2) dy = -1; // السفلي يصعد للأعلى
                if (side === 3) dx = 1;  // الأيسر يتجه لليمين

                for (let h = 1; h <= 5; h++) {
                    const hx = (turnGridPt.gx + dx * h);
                    const hy = (turnGridPt.gy + dy * h);
                    const finalHomeGrid = rotateCoordinates({ gx: hx, gy: hy }, side);
                    
                    // رسم مربعات الأمان بلون اللاعب المطفأ (شفافية خفيفة لعنصر الفخامة)
                    drawWoodSquare(finalHomeGrid.x * squareSize, finalHomeGrid.y * squareSize, colors[side] + 'bb', false, h);
                }
            }

            drawCenterDiscardPile();
        }

        function drawWoodTexture() {
            // تدرج لوني يعطي عمق وملمس الطاولة الخشبية الدائرية
            let gradient = ctx.createRadialGradient(center, center, 40, center, center, 280);
            gradient.addColorStop(0, '#eac39e');
            gradient.addColorStop(0.8, '#d4a574');
            gradient.addColorStop(1, '#ac7a48');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, boardSize, boardSize);

            // نقوش دائرية خفيفة لعروق الخشب
            ctx.strokeStyle = 'rgba(74, 43, 23, 0.04)';
            ctx.lineWidth = 2;
            for(let r = 50; r < 250; r += 30) {
                ctx.beginPath();
                ctx.arc(center, center, r, 0, 2 * Math.PI);
                ctx.stroke();
            }
        }

        function drawWoodSquare(x, y, color, isStart, number) {
            ctx.save();
            ctx.fillStyle = color;
            ctx.fillRect(x + 1, y + 1, squareSize - 2, squareSize - 2);

            // إطار يعطي تأثير الحفر ثلاثي الأبعاد للمربعات
            ctx.strokeStyle = isStart ? '#fff' : '#54341e';
            ctx.lineWidth = isStart ? 2 : 1;
            ctx.strokeRect(x + 1, y + 1, squareSize - 2, squareSize - 2);

            // كتابة أرقام الخانات بشكل خفي وأنيق داخل المربعات الخشبية
            ctx.fillStyle = isStart ? '#fff' : 'rgba(255,255,255,0.25)';
            ctx.font = isStart ? 'bold 11px Arial' : '9px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(number.toString(), x + (squareSize / 2), y + (squareSize / 2));
            ctx.restore();
        }

        function drawCenterDiscardPile() {
            ctx.save();
            ctx.translate(center, center);
            ctx.rotate(5 * Math.PI / 180);

            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 12;
            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            ctx.shadowOffsetY = 4;
            ctx.fillRect(-32, -46, 64, 92);

            ctx.shadowColor = 'transparent';
            ctx.strokeStyle = '#c5a059';
            ctx.lineWidth = 2;
            ctx.strokeRect(-28, -42, 56, 84);

            ctx.fillStyle = '#1c1714';
            ctx.font = 'bold 24px Georgia, serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('+6', 0, 0);
            
            ctx.restore();
        }

        drawBoard();
    </script>
</body>
</html>
