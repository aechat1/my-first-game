<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Tajawal', sans-serif; overflow: hidden; }

        #bg-video {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: -1;
        }

        /* حاوية الصناديق - تم دفعها للأسفل هنا */
        .container {
            display: flex; flex-direction: column; 
            justify-content: flex-end; /* دفع العناصر للأسفل */
            align-items: center; height: 90vh; 
            padding-bottom: 50px; gap: 15px;
        }

        /* الصندوق الشفاف تماماً مع إطار بنفسجي متحرك */
        .box {
            width: 85%; max-width: 300px;
            padding: 15px 10px;
            border-radius: 20px;
            text-align: center; color: white;
            background: transparent; /* شفافية تامة */
            border: 2px solid #8a2be2; /* اللون البنفسجي الأساسي */
            animation: border-glow 3s infinite alternate; /* حركة الإطار */
            text-decoration: none;
        }

        /* تأثير حركة الإطار البنفسجي */
        @keyframes border-glow {
            from { border-color: #8a2be2; box-shadow: 0 0 5px #8a2be2; }
            to { border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff; }
        }

        h1 { font-size: 18px; margin: 0; }
        p { font-size: 12px; margin: 5px 0 0 0; opacity: 0.9; }
        .link { font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="background.mp4" type="video/mp4">
    </video>

    <div class="container">
        <div class="box">
            <h1>منصتي الإماراتية</h1>
            <p>تجربة تواصل وألعاب تليق بطموحكم.</p>
        </div>
        
        <a href="chat.html" class="box link">دخول الشات</a>
        <a href="#" class="box link">تجربة الألعاب</a>
    </div>

</body>
</html>
