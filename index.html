<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة لعبة aechat.ae - الدخول من الحفرة 18</title>
    <style>
        body {
            background-color: #1a0f0a;
            color: #f4ebd0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            padding-top: 10px;
            overflow: hidden;
            user-select: none;
        }
        h1 { 
            margin: 0 0 10px 0; 
            font-size: 16px; 
            color: #d4b285;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .board-container {
            width: 94vw;
            height: 94vw;
            max-width: 480px;
            max-height: 480px;
            position: relative;
        }
        canvas {
            width: 100%;
            height: 100%;
            border: 12px solid #2b1a10;
            border-radius: 28px;
            background-color: #dfb68d;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.6), 0 15px 30px rgba(0,0,0,0.7);
        }
        .cards-area {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            width: 90vw;
            max-width: 450px;
        }
        .game-card {
            width: 65px;
            height: 95px;
            background: linear-gradient(135deg, #2c251e, #1a1512);
            border: 2px solid #c5a059;
            border-radius: 8px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #e5c180;
            font-size: 12px;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .game-card:hover {
            transform: translateY(-8px);
        }
        .card-icon {
            font-size: 18px;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <h1>مشروع لعبة Sorry المطور لـ aechat.ae</h1>
    
    <div class="board-container">
        <canvas id="gameBoard" width="600" height="600"></canvas>
    </div>

    <div class="cards-area">
        <div class="game-card"><span>جاكارو</span><div class="card-icon">👑</div></div>
        <div class="game-card"><span>جاكارو</span><div class="card-icon">⚔️</div></div>
        <div class="game-card"><span>جاكارو</span><div class="card-icon">🛡️</div></div>
        <div class="game-card"><span>جاكارو</span><div class="card-icon">✨</div></div>
    </div>

    <script>
        const canvas = document.getElementById('gameBoard');
        const ctx = canvas.getContext('2d');

        const boardSize = 600;
        const center = boardSize / 2;
        
        const playerColors = {
            player1: '#2ecc71', // أخضر
            player2: '#2980b9', // أزرق
            player3: '#e74c3c', // أحمر
            player4: '#f1c40f'  // أصفر
        };

        function getSidePoints(p1, p2, count) {
            const points = [];
            const controlX = center + ((p1.x + p2.x)/2 - center) * 0.28;
            const controlY = center + ((p1.y + p2.y)/2 - center) * 0.28;

            for (let i = 0; i < count; i++) {
                const t = i / (count - 1);
                const x = (1-t)*(1-t)*p1.x + 2*(1-t)*t*controlX + t*t*p2.x;
                const y = (1-t)*(1-t)*p1.y + 2*(1-t)*t*controlY + t*t*p2.y;
                points.push({x, y});
            }
            return points;
        }

        function drawBoard() {
            ctx.clearRect(0, 0, boardSize, boardSize);
            drawWoodTexture();

            const margin = 50;
            const topC = { x: center, y: margin };
            const rightC = { x: boardSize - margin, y: center };
            const bottomC = { x: center, y: boardSize - margin };
            const leftC = { x: margin, y: center };

            const holesCount = 19;
            const sides = [
                getSidePoints(topC, rightC, holesCount),
                getSidePoints(rightC, bottomC, holesCount),
                getSidePoints(bottomC, leftC, holesCount),
                getSidePoints(leftC, topC, holesCount)
            ];

            sides.forEach((sidePoints, playerIndex) => {
                const colors = [playerColors.player1, playerColors.player2, playerColors.player3, playerColors.player4];
                
                // رسم الـ 19 حفرة الخارجية
                sidePoints.forEach((pt, index) => {
                    let isStart = (index === 0);
                    let color = isStart ? colors[playerIndex] : '#3d2314';
                    drawHole(pt.x, pt.y, color, isStart);
                });

                // تعديل ذكي: التقاط الحفرة رقم 18 (الفهرس 17 في البرمجة لأن العد يبدأ من 0)
                const turnHole = sidePoints[17]; 
                
                // تحديد اتجاه الانحراف للداخل نحو المركز بدقة
                let dx = 0, dy = 0;
                if (playerIndex === 0) { dx = -24; dy = 24; }   // الأخضر للداخل أسفل يسار
                if (playerIndex === 1) { dx = -24; dy = -24; }  // الأزرق للداخل أعلى يسار
                if (playerIndex === 2) { dx = 24; dy = -24; }   // الأحمر للداخل أعلى يمين
                if (playerIndex === 3) { dx = 24; dy = 24; }    // الأصفر للداخل أسفل يمين

                // رسم الـ 5 حفر المتتالية للداخل انطلاقاً من الحفرة 18
                for (let h = 1; h <= 5; h++) {
                    const hx = turnHole.x + (dx * h);
                    const hy = turnHole.y + (dy * h);
                    drawHole(hx, hy, colors[playerIndex] + 'aa', false);
                }
            });

            drawCenterDiscardPile();
        }

        function drawWoodTexture() {
            let gradient = ctx.createRadialGradient(center, center, 50, center, center, 300);
            gradient.addColorStop(0, '#e8be96');
            gradient.addColorStop(0.8, '#d4a574');
            gradient.addColorStop(1, '#b58352');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, boardSize, boardSize);

            ctx.strokeStyle = 'rgba(74, 43, 23, 0.05)';
            ctx.lineWidth = 2;
            for(let r = 40; r < 260; r += 25) {
                ctx.beginPath();
                ctx.arc(center, center, r, 0, 2 * Math.PI);
                ctx.stroke();
            }
        }

        function drawHole(x, y, color, isStart) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(x, y, 9.5, 0, 2 * Math.PI);
            
            if (isStart) {
                ctx.fillStyle = color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            } else {
                ctx.fillStyle = '#26150b';
                ctx.fill();
                ctx.strokeStyle = '#54341e';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawCenterDiscardPile() {
            ctx.save();
            ctx.translate(center, center);
            ctx.rotate(5 * Math.PI / 180);

            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 12;
            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            ctx.shadowOffsetY = 4;
            ctx.fillRect(-32, -46, 64, 92);

            ctx.shadowColor = 'transparent';
            ctx.strokeStyle = '#c5a059';
            ctx.lineWidth = 2;
            ctx.strokeRect(-28, -42, 56, 84);

            ctx.fillStyle = '#1c1714';
            ctx.font = 'bold 24px Georgia, serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('+6', 0, 0);
            
            ctx.restore();
        }

        drawBoard();
    </script>
</body>
</html>
