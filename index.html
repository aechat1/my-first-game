<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            background: #120024; /* خلفية بنفسجية داكنة */
            color: white; text-align: center; padding: 50px 20px; font-family: sans-serif;
            margin: 0; min-height: 100vh;
        }

        /* كلاس للصندوق مع إطار متحرك بألوان علم الإمارات */
        .card { 
            background: #2e0249; 
            padding: 40px; border-radius: 25px; max-width: 450px; margin: auto;
            position: relative;
            border: 4px solid transparent;
            /* حركة ألوان العلم */
            background-clip: padding-box;
            animation: border-rotate 5s linear infinite;
        }

        @keyframes border-rotate {
            0% { border-color: #FF0000; } /* أحمر */
            25% { border-color: #00FF00; } /* أخضر */
            50% { border-color: #FFFFFF; } /* أبيض */
            75% { border-color: #000000; } /* أسود */
            100% { border-color: #FF0000; }
        }

        h1 { color: #CCFF00; text-shadow: 0 0 10px #CCFF00; }
        .btn { 
            display: block; background: #9333ea; color: white; padding: 15px; 
            margin: 15px 0; text-decoration: none; border-radius: 12px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>منصتي الإماراتية</h1>
        <p>تجربة تواصل وألعاب تليق بطموحكم.</p>
        <a href="chat.html" class="btn">دخول الشات</a>
        <a href="#" class="btn">تجربة الألعاب</a>
    </div>
</body>
</html>
