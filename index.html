<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AE CHAT - المنصة الرئيسية</title>
    <style>
        /* إعدادات تصفير وتثبيت أبعاد الشاشة الحقيقية */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; -webkit-user-select: none; }
        html, body { width: 100%; height: 100%; background: #0c0214; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        /* الحاوية الرئيسية: تقسيم الشاشة الإجباري لمنع سقوط أو فقدان أي عنصر */
        .mobile-container { 
            width: 100%; 
            max-width: 430px; 
            height: 100%; 
            background: linear-gradient(180deg, #451066 0%, #25073b 40%, #150224 75%, #0d0114 100%); 
            display: flex; 
            flex-direction: column; /* تقسيم رأسي صارم ومحجوز الأبعاد */
            box-shadow: 0 10px 40px rgba(0,0,0,0.9); 
            overflow: hidden; 
        }
        
        @keyframes uaeGlitter { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* 1. قسم الهيدر العلوي (مساحة ثابتة) */
        .top-header-wrapper {
            width: 100%;
            padding-bottom: 2px;
            background: linear-gradient(90deg, #ff0000, #00732f, #ffffff, #000000, #ff0000);
            background-size: 300% 300%;
            animation: uaeGlitter 5s linear infinite;
            flex-shrink: 0;
        }
        .top-header-inner {
            background: #140221;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-room-section { display: flex; align-items: center; gap: 10px; max-width: 75%; }
        .header-room-badge { width: 34px; height: 34px; border-radius: 50%; background: #25073b; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; justify-content: center; align-items: center; font-size: 14px; }
        .header-room-info { display: flex; flex-direction: column; text-align: right; }
        .header-room-title { font-size: 15px; color: #ffffff; font-weight: 800; }
        .header-room-desc { font-size: 10px; color: #b899d9; opacity: 0.9; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .top-action-btn { background: rgba(255, 59, 48, 0.2); border: 1px solid rgba(255, 59, 48, 0.4); padding: 5px 12px; border-radius: 6px; color: #ff453a; font-size: 11px; font-weight: 700; cursor: pointer; }

        /* 2. قسم شريط الإعلان (مساحة ثابتة مستقلة مستحيل تختفي) */
        .pulsing-ad-bar {
            width: 100%;
            background: rgba(20, 2, 33, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .ad-click-badge { 
            font-size: 11px; 
            background: rgba(255, 255, 255, 0.08); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            color: #ffffff; 
            padding: 5px 12px; 
            border-radius: 6px; 
            font-weight: 600; 
            flex-shrink: 0; 
        }
        .ad-marquee-container {
            flex: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
        }
        /* يخرج النص من جهة زر زيارة في اليسار لليمين */
        .ad-marquee-text {
            display: inline-block;
            white-space: nowrap;
            animation: marqueeLeftToRight 14s linear infinite;
        }
        @keyframes marqueeLeftToRight {
            0% { transform: translate3d(-100%, 0, 0); }
            100% { transform: translate3d(100%, 0, 0); }
        }
        .ad-marquee-text h4 { color: #ffffff; font-size: 13px; font-weight: 700; display: inline-block; margin-left: 8px; }
        .ad-marquee-text span { color: #cfa1fc; font-size: 11px; display: inline-block; }

        /* 3. قسم مساحة عرض الرسائل (مساحة حرة تأخذ المتبقي من الشاشة وتدعم التمرير) */
        .main-content-space {
            flex: 1;
            width: 100%;
            padding: 15px; 
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background: transparent;
        }
        .chat-message {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 85%;
            color: #ffffff;
            font-size: 14px;
            align-self: flex-start;
            word-break: break-word;
        }

        /* 4. حاوية الفوتر السفلي الكلية (مساحة ثابتة ومحجوزة في قاع الشاشة إجبارياً) */
        .bottom-fixed-footer-block {
            width: 100%;
            padding: 10px 15px 15px 15px;
            background: transparent;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0; /* منع المتصفح من ضغط أو إخفاء الفوتر */
        }
        
        /* صندوق الشات الفاخر بدون أي إطار ذهبي فاقع */
        .royal-chat-box {
            width: 100%;
            background: #140221; 
            border: 1px solid rgba(255, 255, 255, 0.12); 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            border-radius: 18px;
            padding: 12px;
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        /* حقل النص والخط السفلي الفضي الناعم الثابت */
        .royal-input-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2); 
            padding: 6px 4px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            text-align: right;
        }
        .chat-input::placeholder { color: rgba(255, 255, 255, 0.4); }

        /* منطقة الأزرار والابتسامات السريعة والمحاذاة الثابتة */
        .royal-emoji-area {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
            border-right: 1px solid rgba(255, 255, 255, 0.15); 
            padding-right: 8px;
            direction: ltr; 
        }
        .royal-emoji-btn { font-size: 20px; cursor: pointer; transition: transform 0.2s; background: none; border: none; display: flex; justify-content: center; align-items: center; }
        .royal-emoji-btn:active { transform: scale(0.85); }
        .more-emoji-btn { font-size: 15px; color: #b899d9; font-weight: bold; background: none; border: none; cursor: pointer; }
        .royal-send-btn { font-size: 18px; color: #52b788; font-weight: bold; cursor: pointer; background: none; border: none; padding: 0 4px; }

        /* شريط المتواجدين حالياً وخيارات المشرف السفلي التابع للكتلة الثابتة */
        .admin-status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
            width: 100%;
        }
        .online-count-box {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #b899d9;
            font-size: 12px;
            font-weight: 600;
        }
        .online-dot {
            width: 7px;
            height: 7px;
            background: #52b788;
            border-radius: 50%;
            box-shadow: 0 0 6px #52b788;
        }
        .admin-gear-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #b899d9;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* صندوق اختيار المزيد من الابتسامات المنبثق المحمي المرتفع برمجياً */
        .emoji-picker-popup {
            position: absolute;
            bottom: 135px; 
            left: 15px;
            right: 15px;
            background: #140221;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 12px;
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.8);
            z-index: 30;
        }
        .emoji-picker-popup.active { display: grid; }
        .picker-emoji-item { display: flex; justify-content: center; align-items: center; font-size: 26px; cursor: pointer; padding: 4px; border-radius: 8px; }
        .picker-emoji-item:hover { background: rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body>

    <div class="mobile-container">
        
        <!-- 1. الهيدر العلوي الرسمي -->
        <div class="top-header-wrapper">
            <div class="top-header-inner">
                <div class="header-room-section">
                    <div class="header-room-badge">👑</div>
                    <div class="header-room-info">
                        <span class="header-room-title">غرفة بن دبي</span>
                        <span class="header-room-desc">مجلس تبادل الأحاديث الثقافية الراقية لأهل دبي</span>
                    </div>
                </div>
                <div class="top-action-btn" onclick="exitRoom()">خروج</div>
            </div>
        </div>

        <!-- 2. شريط الإعلان المحجوز مساحياً: يخرج النص من جهة اليسار لليمين وبشكل دائم -->
        <div class="pulsing-ad-bar" id="secureAd" data-target-url="https://instagram.com">
            <span class="ad-click-badge">زيارة</span>
