<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة لعبة aechat.ae - نيون</title>
    <style>
        body {
            background-color: #0d0e15; /* خلفية داكنة جداً تبرز النيون */
            color: #00E5FF;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 { 
            margin-bottom: 15px; 
            font-size: 20px; 
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.6);
        }
        .board-container {
            width: 92vw;
            height: 92vw;
            max-width: 550px;
            max-height: 550px;
            position: relative;
        }
        canvas {
            width: 100%;
            height: 100%;
            border: 4px solid #1f2335;
            border-radius: 12px;
            background-color: #141522; /* أرضية اللوحة الداخلية */
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.25);
        }
    </style>
</head>
<body>

    <h1>لوحة لعبة Sorry المبرمجة لـ aechat.ae</h1>
    
    <div class="board-container">
        <canvas id="gameBoard" width="600" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameBoard');
        const ctx = canvas.getContext('2d');

        const boardSize = 600;
        const squaresPerSide = 19; 
        const squareSize = boardSize / squaresPerSide;

        // ألوان النيون المشعة
        const playerColors = {
            player1: '#39FF14', // أخضر نيون فسفوري
            player2: '#00E5FF', // أزرق كهربائي
            player3: '#FF007F', // فوشيا نيون
            player4: '#CCFF00'  // أصفر ليموني مشع
        };

        function drawBoard() {
            ctx.clearRect(0, 0, boardSize, boardSize);

            // رسم المسار الخارجي للمربعات (19 في كل ضلع)
            for (let i = 0; i < squaresPerSide; i++) {
                drawSquare(i * squareSize, 0, i === 1 ? playerColors.player1 : '#1a1b26', i === 1);
                drawSquare(boardSize - squareSize, i * squareSize, i === 1 ? playerColors.player2 : '#1a1b26', i === 1);
                drawSquare((squaresPerSide - 1 - i) * squareSize, boardSize - squareSize, i === 1 ? playerColors.player3 : '#1a1b26', i === 1);
                drawSquare(0, (squaresPerSide - 1 - i) * squareSize, i === 1 ? playerColors.player4 : '#1a1b26', i === 1);
            }

            // رسم قطع اللعب (البيادق النيون)
            drawPawn(1 * squareSize, 0, playerColors.player1); 
            drawPawn(boardSize - squareSize, 1 * squareSize, playerColors.player2); 
        }

        function drawSquare(x, y, color, isStart) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, squareSize, squareSize);

            ctx.strokeStyle = '#292e42';
            ctx.lineWidth = 1;
            ctx.strokeRect(x, y, squareSize, squareSize);

            if (isStart) {
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(x + 2, y + 2, squareSize - 4, squareSize - 4);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('1', x + (squareSize/2), y + (squareSize/2));
            }
        }

        function drawPawn(x, y, color) {
            const centerX = x + squareSize / 2;
            const centerY = y + squareSize / 2;
            const radius = squareSize * 0.35;

            // توهج خلف القطعة (Glow)
            ctx.shadowBlur = 10;
            ctx.shadowColor = color;

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.fillStyle = color;
            ctx.fill();
            
            // إعادة ضبط الظل لمنع التأثير على بقية العناصر
            ctx.shadowBlur = 0;

            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        drawBoard();
    </script>
</body>
</html>
