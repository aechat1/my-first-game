<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصتي الإماراتية</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f172a; 
            color: white; 
            text-align: center; 
            padding: 50px 20px; 
            margin: 0;
        }
        .card { 
            background: #1e293b; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            max-width: 500px; 
            margin: auto; 
        }
        h1 { color: #38bdf8; margin-bottom: 20px; }
        p { color: #94a3b8; margin-bottom: 30px; }
        .btn { 
            display: block; 
            background: #38bdf8; 
            color: #0f172a; 
            padding: 15px; 
            margin: 15px 0; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background: #7dd3fc; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="card">
        <h1>أهلاً بك في منصتي</h1>
        <p>نعمل على بناء تجربة تواصل وألعاب تليق بطموحكم في الإمارات.</p>
        
        <a href="chat.html" class="btn">دخول الشات</a>
        
        <a href="#" class="btn">تجربة الألعاب</a>
    </div>

</body>
</html>
