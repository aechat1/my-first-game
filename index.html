<!DOCTYPE html>
<html>
<head>
    <title>لعبتي الأولى</title>
    <style>
        body { background: #1a1a1a; color: #fff; text-align: center; font-family: Arial; padding-top: 50px; }
        input { padding: 10px; font-size: 16px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; font-size: 16px; background: #00ffcc; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>لعبة تخمين الرقم</h1>
    <p>خمن رقماً بين 1 و 10</p>
    <input type="number" id="guess" min="1" max="10">
    <button onclick="check()">تحقق</button>
    <h2 id="result"></h2>

    <script>
        let random = Math.floor(Math.random() * 10) + 1;
        function check() {
            let g = document.getElementById("guess").value;
            let r = document.getElementById("result");
            if(g == random) r.innerHTML = "🎉 كفو! جبتها صح";
            else r.innerHTML = "❌ خطأ، حاول مرة ثانية";
        }
    </script>
</body>
</html>
