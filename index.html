<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصتي الإماراتية</title>
    <style>
        /* الخلفية البنفسجية الفخمة */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #2e0249, #570a57); 
            color: white; 
            text-align: center; 
            padding: 50px 20px; 
            margin: 0;
            min-height: 100vh;
        }
        .card { 
            background: rgba(46, 2, 73, 0.8); 
            padding: 40px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            max-width: 450px; 
            margin: auto; 
            border: 1px solid #9333ea;
        }
        /* العنوان باللون الأخضر الليموني المضيء */
        h1 { color: #CCFF00; margin-bottom: 20px; text-shadow: 0 0 10px #CCFF00; }
        p { color: #e2e8f0; margin-bottom: 30px; }
        
        .btn { 
            display: block; 
            background: #9333ea; 
            color: white; 
            padding: 15px; 
            margin: 15px 0; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: bold;
            transition: 0.3s;
            border: 2px solid #CCFF00;
        }
        .btn:hover { 
            background: #CCFF00; 
            color: #2e0249;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>منصتي الإماراتية</h1>
        <p>تجربة تواصل وألعاب تليق بطموحكم.</p>
        
        <a href="chat.html" class="btn">دخول الشات</a>
        <a href="#" class="btn">تجربة الألعاب</a>
    </div>

</body>
</html>
