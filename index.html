<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Tajawal', sans-serif; overflow: hidden; }

        #bg-video {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: -1;
        }

        /* حاوية العناصر */
        .container {
            display: flex; flex-direction: column; justify-content: center; /* توسيط عمودي */
            align-items: center; height: 100vh; gap: 15px; /* مسافة ثابتة بين الصناديق */
            padding: 20px;
        }

        /* الصناديق الشفافة بإطار متدرج */
        .box {
            width: 100%; max-width: 300px;
            padding: 15px 10px;
            border-radius: 20px;
            text-align: center; color: white;
            border: 2px solid transparent;
            background-image: linear-gradient(#000, #000), 
                              linear-gradient(to right, #ff7e5f, #2ebf91);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            text-decoration: none;
        }

        h1 { font-size: 18px; margin: 0; }
        p { font-size: 12px; margin: 5px 0 0 0; opacity: 0.9; }
        .link { font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="background.mp4" type="video/mp4">
    </video>

    <div class="container">
        <div class="box">
            <h1>منصتي الإماراتية</h1>
            <p>تجربة تواصل وألعاب تليق بطموحكم.</p>
        </div>
        
        <a href="chat.html" class="box link">دخول الشات</a>
        <a href="#" class="box link">تجربة الألعاب</a>
    </div>

</body>
</html>
